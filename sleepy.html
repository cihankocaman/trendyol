<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trendyol'a Yönlendiriliyorsunuz</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f6f6f6;
    }
    .container {
      text-align: center;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 80%;
      max-width: 400px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background-color: #f27a1a; /* Trendyol Turuncusu */
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      border: none;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #f27a1a;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script>
    var webUrl = "https://ty.gl/7doah8ugjmrzn";
    var ua = navigator.userAgent.toLowerCase();

    function openApp() {
      if (/android/.test(ua)) {
        // Doğru paket adı ile Android Intent
        var androidIntent = "intent://ty.gl/7doah8ugjmrzn#Intent;scheme=https;package=com.trendyol.android;S.browser_fallback_url=" + encodeURIComponent(webUrl) + ";end";
        window.location.href = androidIntent;
      } else if (/iphone|ipad|ipod/.test(ua)) {
        // iOS Deep Link
        window.location.href = "trendyol://ty.gl/7doah8ugjmrzn";
        setTimeout(function() { window.location.replace(webUrl); }, 2500);
      } else {
        window.location.replace(webUrl);
      }
    }

    // Sayfa açıldığında 1 saniye sonra otomatik denesin
    window.onload = function() {
      setTimeout(openApp, 1000);
    };
  </script>
</head>
<body>

  <div class="container">
    <div class="loader"></div>
    <p>Uygulama açılıyor, lütfen bekleyin...</p>
    
    <button class="btn" onclick="openApp()">UYGULAMADA AÇ</button>
    
    <p style="font-size: 12px; color: #777; margin-top: 20px;">
      Eğer uygulama yüklü değilse web sayfasına yönlendirileceksiniz.
    </p>
  </div>

</body>
</html>
