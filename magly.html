<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yönlendiriliyor...</title>
  <style>
    /* Sadece Android kullanıcıları butonu görecek */
    body {
      margin: 0; padding: 0; display: none; 
      font-family: sans-serif; height: 100vh;
      align-items: center; justify-content: center; background-color: #fff;
    }
    .btn {
      display: inline-block; padding: 18px 36px;
      background-color: #f27a1a; color: white;
      text-decoration: none; border-radius: 12px;
      font-weight: bold; font-size: 18px; border: none;
    }
  </style>
</head>
<body>

  <div style="text-align: center; padding: 20px;">
    <p>Uygulamada devam etmek için lütfen tıklayın:</p>
    <button onclick="triggerApp()" class="btn">TRENDYOL'DA AÇ</button>
  </div>

  <script>
    var webUrl = "https://ty.gl/7doah8ugjmrzn";
    var ua = navigator.userAgent.toLowerCase();
    var isAndroid = ua.indexOf("android") > -1;
    var isIos = /iphone|ipad|ipod/.test(ua);
    var isFacebookOrInstagram = ua.indexOf("fbav") > -1 || ua.indexOf("instagram") > -1;

    function triggerApp() {
      if (isAndroid) {
        // Facebook/Instagram içi tarayıcı Android'de intent'i bazen sadece tıklamayla kabul eder
        var intentUrl = "intent://ty.gl/wy3hjfuoiyh4n#Intent;scheme=https;package=com.trendyol.android;S.browser_fallback_url=" + encodeURIComponent(webUrl) + ";end";
        window.location.href = intentUrl;
      } else {
        window.location.href = "trendyol://ty.gl/wy3hjfuoiyh4n";
        setTimeout(function() { window.location.replace(webUrl); }, 2000);
      }
    }

    window.onload = function() {
      if (isIos) {
        // iOS ise hiç bekleme, direkt şemayı fırlat
        window.location.href = "trendyol://ty.gl/wy3hjfuoiyh4n";
        // Eğer uygulama açılmazsa 2sn sonra web'e git
        setTimeout(function() { window.location.replace(webUrl); }, 2000);
      } 
      else if (isAndroid) {
        // Android ise sayfayı göster (Facebook engeli için buton ŞART)
        document.body.style.display = "flex";
        
        // Eğer Facebook/Instagram içindeysek bazen otomatik tetikleme çalışmaz
        // Ama yine de bir şansımızı deneyelim
        setTimeout(triggerApp, 500);
      } 
      else {
        window.location.replace(webUrl);
      }
    };
  </script>
</body>
</html>
